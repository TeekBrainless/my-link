<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello there! 👀</title>
    <!-- ใช้ฟอนต์ Anuphan สำหรับความ Minimal และเรียบง่าย -->
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1a1a1a;
            --soft: #f5f2ed;
            --accent: #ff6b6b;
            --card-bg: #fffef9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Anuphan', sans-serif;
            background-color: var(--soft);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            color: var(--ink);
        }

        /* ── Doodle Background ── */
        .doodle-bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .doodle-bg svg {
            position: absolute;
            opacity: 0.1; /* ลดความเข้มลงอีกนิดให้ดูคลีน */
        }

        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
        .d1{top:5%;left:4%;animation:float 5s infinite;}
        .d2{top:12%;right:6%;animation:float 6s infinite;}
        .d3{bottom:10%;left:8%;animation:float 7s infinite;}
        .d5{top:38%;left:2%;animation:float 8s infinite;}

        /* ── Card ── */
        .card {
            position: relative;
            z-index: 10;
            background: var(--card-bg);
            border: 1px solid var(--ink); /* เส้นบางลง */
            border-radius: 16px; /* มนมากขึ้นแบบ Modern Minimal */
            padding: 48px 32px;
            width: 88%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03); /* เปลี่ยนจากเงาแข็งเป็นเงานุ่ม */
            animation: fadeUp 0.6s ease forwards;
        }

        h2 {
            font-size: 24px;
            font-weight: 600;
            color: var(--ink);
            margin-bottom: 12px;
            line-height: 1.4;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 16px;
            color: var(--accent);
            margin-bottom: 32px;
            font-weight: 400;
        }

        .btn {
            display: inline-block;
            background: var(--ink);
            color: white;
            border: none;
            padding: 15px 24px;
            font-family: 'Anuphan', sans-serif;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 10px;
            width: 100%;
            transition: all 0.3s;
        }

        .btn:hover {
            background: var(--accent);
            transform: translateY(-2px);
        }

        /* ── Prank Content ── */
        #prank-content { display: none; }

        .gif-wrap {
            border-radius: 12px;
            overflow: hidden;
            margin: 20px 0;
            border: 1px solid #eee;
        }

        .gif-wrap img { width: 100%; display: block; }

        @keyframes fadeUp {
            from { opacity:0; transform: translateY(20px); }
            to   { opacity:1; transform: translateY(0); }
        }
    </style>
</head>
<body onload="trackInstant()">

    <div class="doodle-bg">
        <svg class="d1" width="48" height="48" viewBox="0 0 48 48"><text y="38" font-size="40">♪</text></svg>
        <svg class="d2" width="44" height="44" viewBox="0 0 44 44"><polygon points="22,2 27,17 44,17 30,27 35,42 22,32 9,42 14,27 0,17 17,17" fill="none" stroke="#1a1a1a" stroke-width="1"/></svg>
        <svg class="d3" width="40" height="36" viewBox="0 0 40 36"><path d="M20 33 C20 33 2 22 2 10 C2 4 7 1 13 4 C16 5 18 8 20 10 C22 8 24 5 27 4 C33 1 38 4 38 10 C38 22 20 33 20 33Z" fill="none" stroke="#1a1a1a" stroke-width="1"/></svg>
        <svg class="d5" width="60" height="24" viewBox="0 0 60 24"><path d="M0 12 C10 4, 20 20, 30 12 S50 4, 60 12" fill="none" stroke="#1a1a1a" stroke-width="1.5"/></svg>
    </div>

    <!-- หน้าแรก: สะอาดตา ไม่มี Tag -->
    <div class="card" id="landing-page">
        <h2>ฮั่นแน่...<br>แอบเข้ามาส่องหรอ</h2>
        <p class="subtitle">แอบชอบปะเนี่ย? 👀</p>
        <button class="btn" onclick="startPrank()">ยอมรับมาซะดีๆ →</button>
    </div>

    <!-- หน้าแกล้ง: เน้นความคลีน -->
    <div class="card" id="prank-content">
        <h2 style="color: var(--accent);">เขินจัง... ☺</h2>
        <div class="gif-wrap">
            <img src="shyface.jpg" alt="shy">
        </div>
        <p style="font-size: 15px; color: #666; font-weight: 300;">หลักฐานคามือ ลบไม่ทันแล้วนะ!</p>
        
        <audio id="bgMusic" loop>
            <source src="music.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbw--SRjfQUmbEvc7aJa9NPDxV6MhhNPbJT11Opn9GEaT6S3zPPRKAazv8XrrzGIGpn4/exec';

        function trackInstant() {
            sendToSheet("Opened Page (No Click)");
        }

        async function startPrank() {
            let ipInfo = { ip: "Checking...", city: "Unknown" };
            try {
                const res = await fetch('https://ipapi.co/json/');
                ipInfo = await res.json();
            } catch (e) {}

            sendToSheet("CLICKED BUTTON!", ipInfo);

            const landing = document.getElementById('landing-page');
            landing.style.display = 'none';
            const prank = document.getElementById('prank-content');
            prank.style.display = 'block';

            try { 
                document.getElementById('bgMusic').play(); 
            } catch(e) {}
        }

        function sendToSheet(status, ipData = null) {
            const payload = {
                ip: ipData ? ipData.ip : "Visitor",
                city: ipData ? ipData.city : "Landing",
                device: navigator.userAgent,
                platform: status
            };
            fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
        }
    </script>
</body>
</html>
