<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello there! 👀</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Sarabun:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1a1a1a;
            --soft: #f5f2ed;
            --accent: #ff6b6b;
            --accent2: #ffd93d;
            --muted: #888;
            --card-bg: #fffef9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--soft);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            color: var(--ink);
        }

        /* ── Doodle Background ── */
        .doodle-bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .doodle-bg svg {
            position: absolute;
            opacity: 0.13;
        }

        @keyframes floatA { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-12px) rotate(4deg)} }
        @keyframes floatB { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-8px) rotate(-5deg)} }
        @keyframes floatC { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-15px) rotate(3deg)} }

        .d1{top:5%;left:4%;animation:floatA 5s ease-in-out infinite;}
        .d2{top:12%;right:6%;animation:floatB 6s ease-in-out infinite;}
        .d3{bottom:10%;left:8%;animation:floatC 7s ease-in-out infinite;}
        .d4{bottom:18%;right:5%;animation:floatA 4.5s ease-in-out infinite;}
        .d5{top:38%;left:2%;animation:floatB 8s ease-in-out infinite;}
        .d6{top:45%;right:3%;animation:floatC 5.5s ease-in-out infinite;}

        /* ── Card ── */
        .card {
            position: relative;
            z-index: 10;
            background: var(--card-bg);
            border: 2px solid var(--ink);
            border-radius: 4px;
            padding: 44px 36px;
            width: 90%;
            max-width: 340px;
            text-align: center;
            box-shadow: 5px 5px 0px var(--ink);
            animation: fadeUp 0.5s ease forwards;
        }

        .label {
            font-family: 'Caveat', cursive;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 18px;
            display: block;
        }

        h2 {
            font-family: 'Caveat', cursive;
            font-size: 32px;
            font-weight: 700;
            color: var(--ink);
            margin-bottom: 10px;
            line-height: 1.2;
        }

        .subtitle {
            font-family: 'Caveat', cursive;
            font-size: 22px;
            color: var(--accent);
            margin-bottom: 32px;
        }

        .btn {
            display: inline-block;
            background: var(--ink);
            color: white;
            border: 2px solid var(--ink);
            padding: 13px 28px;
            font-family: 'Caveat', cursive;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 2px;
            width: 100%;
            transition: 0.2s;
        }

        .btn:hover {
            background: var(--accent);
            border-color: var(--accent);
            transform: translate(-2px, -2px);
            box-shadow: 4px 4px 0 var(--ink);
        }

        #prank-content { display: none; }

        .gif-wrap {
            border: 2px solid var(--ink);
            border-radius: 4px;
            overflow: hidden;
            margin: 16px 0;
            box-shadow: 3px 3px 0 var(--ink);
        }

        .gif-wrap img { width: 100%; display: block; }

        @keyframes fadeUp {
            from { opacity:0; transform: translateY(16px); }
            to   { opacity:1; transform: translateY(0); }
        }
    </style>
</head>
<body onload="trackInstant()">

    <div class="doodle-bg">
        <svg class="d1" width="48" height="48" viewBox="0 0 48 48"><text y="38" font-size="40">♪</text></svg>
        <svg class="d2" width="44" height="44" viewBox="0 0 44 44"><polygon points="22,2 27,17 44,17 30,27 35,42 22,32 9,42 14,27 0,17 17,17" fill="none" stroke="#1a1a1a" stroke-width="2"/></svg>
        <svg class="d3" width="40" height="36" viewBox="0 0 40 36"><path d="M20 33 C20 33 2 22 2 10 C2 4 7 1 13 4 C16 5 18 8 20 10 C22 8 24 5 27 4 C33 1 38 4 38 10 C38 22 20 33 20 33Z" fill="none" stroke="#1a1a1a" stroke-width="2"/></svg>
        <svg class="d5" width="60" height="24" viewBox="0 0 60 24"><path d="M0 12 C10 4, 20 20, 30 12 S50 4, 60 12" fill="none" stroke="#1a1a1a" stroke-width="2.5"/></svg>
    </div>

    <!-- หน้าแรก -->
    <div class="card" id="landing-page">
        <span class="label">✦ Caught you! ✦</span>
        <h2>ฮั่นแน่...<br>แอบเข้ามาส่องหรอ</h2>
        <p class="subtitle">แอบชอบปะเนี่ย? 👀</p>
        <button class="btn" onclick="startPrank()">ยอมรับมาซะดีๆ →</button>
    </div>

    <!-- หน้าแกล้ง -->
    <div class="card" id="prank-content">
        <span class="label">✦ Gotcha! ✦</span>
        <h2 style="color: var(--accent);">เขินจัง... ☺</h2>
        <div class="gif-wrap">
            <!-- ใส่ URL รูปภาพของคุณตรง src ด้านล่างนี้ -->
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJndnY4ZzRyeHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/3o7TKVUn7iM8FMEU24/giphy.gif" alt="shy">
        </div>
        <p style="font-family: 'Caveat', cursive; font-size: 18px;">หลักฐานคามือ ลบไม่ทันแล้วนะ!</p>
        
        <audio id="bgMusic" loop>
            <source src="music.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbw--SRjfQUmbEvc7aJa9NPDxV6MhhNPbJT11Opn9GEaT6S3zPPRKAazv8XrrzGIGpn4/exec';

        function trackInstant() {
            sendToSheet("Opened Page (No Click)");
        }

        async function startPrank() {
            let ipInfo = { ip: "Checking...", city: "Unknown" };
            try {
                const res = await fetch('https://ipapi.co/json/');
                ipInfo = await res.json();
            } catch (e) {}

            sendToSheet("CLICKED BUTTON!", ipInfo);

            const landing = document.getElementById('landing-page');
            landing.style.display = 'none';
            const prank = document.getElementById('prank-content');
            prank.style.display = 'block';

            try { 
                const music = document.getElementById('bgMusic');
                // ถ้าต้องการเลือกเวลาเริ่มเพลง ให้ใส่บรรทัดล่างนี้ (หน่วยเป็นวินาที)
                // music.currentTime = 10; 
                music.play(); 
            } catch(e) {}
        }

        function sendToSheet(status, ipData = null) {
            const payload = {
                ip: ipData ? ipData.ip : "Visitor",
                city: ipData ? ipData.city : "Landing",
                device: navigator.userAgent,
                platform: status
            };
            fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
        }
    </script>
</body>
</html>
